<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>饭团姐姐门店数据看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#f0f2f5;color:#222}

/* 详情页 */
.detail-view{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#f0f2f5;z-index:100;overflow-y:auto}
.detail-view.active{display:block}
.detail-wrap{max-width:1100px;margin:0 auto;padding:20px}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;background:#fff;border-radius:8px;text-decoration:none;color:#4472C4;font-size:14px;margin-bottom:16px;cursor:pointer;border:none;font-family:inherit}
.back-btn:hover{background:#f0f5ff}
.title-box{background:#fff;border-radius:12px;padding:24px 28px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.title-box h1{font-size:22px;color:#1a1a1a;margin-bottom:4px}
.title-box .sub{font-size:13px;color:#888}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.stat-c{background:#fff;border-radius:12px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.stat-c .sl{font-size:12px;color:#888;margin-bottom:6px}
.stat-c .sv{font-size:22px;font-weight:700;color:#1a1a1a}
.stat-c .sc{font-size:12px;margin-top:4px}
.stat-c .sc.up{color:#52c41a}.stat-c .sc.down{color:#f5222d}.stat-c .sc.neu{color:#999}

/* 文件列表 */
.file-section{background:#fff;border-radius:12px;padding:16px 20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.file-section h3{font-size:14px;color:#333;margin-right:8px;white-space:nowrap}
.file-tag{display:inline-flex;align-items:center;gap:6px;background:#f0f5ff;color:#4472C4;padding:5px 12px;border-radius:20px;font-size:13px}
.file-tag .del{color:#f5222d;cursor:pointer;font-weight:700;margin-left:4px;font-size:15px}
.file-tag .del:hover{color:#c41d3c}
.file-empty{color:#999;font-size:13px}

.procurement-section{margin-bottom:20px}
</style>
</head>
<body>

<!-- 主应用内容 -->
<div id="appContent">

<!-- ========== 主页 ========== -->
<div class="wrap" id="mainView">
  <div class="header">
    <h1>🍙 <span>饭团姐姐</span> 门店数据看板</h1>
    <div class="stat">
      <div class="stat-item"><div class="num" id="sStores">--</div><div class="label">门店数</div></div>
      <div class="stat-item"><div class="num" id="sDates">--</div><div class="label">数据天数</div></div>
            <div class="stat-item"><div class="num" id="sTotal">--</div><div class="label">总金额合计</div></div>
      <button class="upload-btn" onclick="document.getElementById('fileInput').click()">📁 上传数据</button>
      <input type="file" id="fileInput" accept=".xls,.xlsx,.csv" style="display:none" onchange="handleUpload(this.files[0])">
    </div>
  </div>
  <div id="uploadStatus" style="display:none;background:#fff;padding:14px 20px;border-radius:12px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)"></div>

  
  <div class="file-section" id="fileSection">
    <h3>📂 已上传文件</h3>
    <div id="fileTags"></div>
    <button class="upload-btn" style="padding:6px 14px;font-size:13px" onclick="document.getElementById('fileInput').click()">+ 添加文件</button>
    <button class="upload-btn" style="padding:6px 14px;font-size:13px;background:#f5222d" onclick="clearAllData()">🗑 清空所有</button>
  </div>

  <div class="search-bar">
    <input type="text" placeholder="🔍 搜索门店名称..." oninput="filterS()">
  </div>

  <div class="charts" id="overviewCharts"></div>

  <div class="grid" id="topGrid"></div>

  <div class="daily-table" id="dailyTableWrap" style="display:none">
    <h3>📊 每日汇总</h3>
    <table><thead><tr id="dailyHead"></tr></thead><tbody id="dailyBody"></tbody></table>
  </div>

  <div class="store-list" id="storeListWrap" style="display:none">
    <h3>🏪 所有门店</h3>
    <div id="storeRows"></div>
  </div>
</div>

<!-- ========== 详情页 ========== -->
<div class="detail-view" id="detailView">
  <div class="detail-wrap">
    <button class="back-btn" onclick="closeDetail()">← 返回看板</button>
    <div class="title-box"><h1 id="dTitle">🏪 --</h1><div class="sub" id="dSub"></div></div>
    
    <div class="procurement-section" id="procurementSection" style="display:none">
      <div class="chart-card" style="margin-bottom:20px">
        <h3>📦 采购统计</h3>
        <div id="procStats" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:12px"></div>
      </div>
    </div>
    <div class="stats-grid" id="dStats"></div>
    <div class="charts"><div class="chart-card"><h3>各渠道金额对比</h3><canvas id="dcBar" height="140"></canvas></div><div class="chart-card"><h3>渠道占比</h3><canvas id="dcPie" height="140"></canvas></div></div>
    <div class="charts"><div class="chart-card"><h3>总支付金额趋势</h3><canvas id="dcTrend" height="100"></canvas></div><div class="chart-card"><h3>外卖渠道趋势</h3><canvas id="dcDeliv" height="100"></canvas></div></div>
    <div class="daily-table"><h3>每日明细</h3><table><thead><tr id="dtHead"></tr></thead><tbody id="dtBody"></tbody></table></div>
  </div>
</div>


<script src="libs/xlsx.full.min.js"></script>
<script>
// ══════════════════════════════════════
// 纯本地版 - 无需后端
// ══════════════════════════════════════
const DATA = {};
const dates = [];
const FILE_STORAGE_KEY = 'ft_dashboard_files';

function loadFileList() {
  try { return JSON.parse(localStorage.getItem(FILE_STORAGE_KEY)) || []; } catch(e) { return []; }
}
function saveFileList(list) {
  localStorage.setItem(FILE_STORAGE_KEY, JSON.stringify(list));
}

function renderFileList() {
  const el = document.getElementById('fileTags');
  const files = loadFileList();
  if (files.length === 0) {
    el.innerHTML = '<span class="file-empty">暂无文件，请上传 Excel</span>';
  } else {
    el.innerHTML = files.map((f,i) =>
      '<span class="file-tag">' + esc(f.name) + ' <span class="del" onclick="removeFile(' + i + ')" title="删除">\u00d7</span></span>'
    ).join('');
  }
}

function rebuildData() {
  Object.keys(DATA).forEach(k => delete DATA[k]);
  dates.length = 0;
  const files = loadFileList();
  for (const f of files) {
    if (f.data) {
      for (const dt of Object.keys(f.data)) {
        const stores = f.data[dt];
        if (!DATA[dt]) DATA[dt] = {};
        for (const name of Object.keys(stores)) {
          const vals = stores[name];
          if (!DATA[dt][name]) {
            DATA[dt][name] = { 总支付:0, 抖音验券:0, 微信支付:0, 支付宝:0, 现金:0, 京东外卖:0, 美团外卖:0, 淘宝闪购:0, 美团验券:0, 抖音外卖:0, 采购:0 };
          }
          for (const k of Object.keys(vals)) {
            DATA[dt][name][k] = (DATA[dt][name][k]||0) + vals[k];
          }
        }
      }
    }
  }
  dates.push(...Object.keys(DATA).sort());
}

function removeFile(idx) {
  const files = loadFileList();
  if (idx < 0 || idx >= files.length) return;
  files.splice(idx, 1);
  saveFileList(files);
  renderFileList();
  allStores = [];
  rebuildData();
  init();
}

function clearAllData() {
  if (!confirm('确定清空所有数据？')) return;
  localStorage.removeItem(FILE_STORAGE_KEY);
  Object.keys(DATA).forEach(k => delete DATA[k]);
  dates.length = 0;
  allStores = [];
  init();
  renderFileList();
}

const channels = ['总支付','抖音验券','微信支付','支付宝','现金','京东外卖','美团外卖','淘宝闪购','美团验券','抖音外卖'];
const chShort = ['抖音验券','微信支付','支付宝','京东外卖','美团外卖','淘宝闪购','美团验券','抖音外卖'];
let allStores = [];

function parseExcelDate(raw) {
  if (!raw) return '';
  let d = null;
  if (typeof raw === 'number') {
    d = new Date((raw - 25569) * 86400 * 1000);
  } else if (raw instanceof Date) {
    d = raw;
  } else {
    var s = String(raw).trim();
    if (/^\d{4}[\/\-]\d{2}[\/\-]\d{2}$/.test(s)) return s.replace(/-/g, '/');
    d = new Date(s);
  }
  if (d && !isNaN(d)) {
    return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
  }
  return '';
}

async function handleUpload(file) {
  if (!file) return;
  var st = document.getElementById("uploadStatus");
  st.style.display = "block"; st.innerHTML = "解析中...";
  
  try {
    var buf = await file.arrayBuffer();
    var wb = XLSX.read(buf, { type: 'array' });
    var sheet = wb.Sheets[wb.SheetNames[0]];
    var rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
    
    if (rows.length < 3) throw new Error('文件格式错误');
    
    var candidateRows = [];
    for (var i = 0; i < Math.min(rows.length, 20); i++) {
      var row = rows[i];
      if (!row || !row.length || row.every(function(c){return c===''||c==null})) continue;
      var strRow = row.map(function(h){return String(h).trim()});
      if (strRow.every(function(h){return /^\d+$/.test(h)||/^列\d+$/.test(h)||h==='' })) continue;
      candidateRows.push({ idx: i, row: strRow });
    }
    if (candidateRows.length === 0) throw new Error('无法识别表头');
    
    var firstRowStr = candidateRows[0].row.join(' ');
    var looksLikeDateRange = /[\/\-年月日]/.test(firstRowStr);
    
    var headerRowIdx, headers;
    if (looksLikeDateRange && candidateRows.length >= 2) {
      headerRowIdx = candidateRows[1].idx;
      headers = candidateRows[1].row;
    } else {
      headerRowIdx = candidateRows[0].idx;
      headers = candidateRows[0].row;
    }
    
    var fileDate = '';
    var dateIdx = headers.findIndex(function(h){return h.includes('日期')});
    if (dateIdx !== -1) {
      fileDate = parseExcelDate(rows[headerRowIdx + 1][dateIdx]);
    } else if (looksLikeDateRange && candidateRows.length >= 2) {
      var dateRangeStr = candidateRows[0].row.join(' ').trim();
      var dateMatch = dateRangeStr.match(/(\d{4}[\/\-]\d{2}[\/\-]\d{2})/);
      if (dateMatch) fileDate = dateMatch[1].replace(/-/g, '/');
    }
    if (!fileDate) throw new Error('无法识别日期');
    
    var chMap = {
      '总支付金额': '总支付', '抖音验券金额': '抖音验券',
      '微信支付金额': '微信支付', '支付宝金额': '支付宝',
      '美团外卖金额': '美团外卖', '京东外卖金额': '京东外卖',
      '淘宝闪购金额': '淘宝闪购', '美团验券金额': '美团验券',
      '抖音外卖金额': '抖音外卖', '现金金额': '现金',
      '采购': '采购'
    };
    
    var storeData = {};
    for (var i = headerRowIdx + 1; i < rows.length; i++) {
      var row = rows[i];
      if (!row.length) continue;
      var name = String(row[headers.findIndex(function(h){return h.includes('门店')})] || '').trim();
      if (!name) continue;
      
      var rowDate = fileDate;
      if (dateIdx !== -1 && row[dateIdx] != null) {
        var parsed = parseExcelDate(row[dateIdx]);
        if (parsed) rowDate = parsed;
      }
      
      if (!storeData[rowDate]) storeData[rowDate] = {};
      if (!storeData[rowDate][name]) {
        storeData[rowDate][name] = { 总支付:0, 抖音验券:0, 微信支付:0, 支付宝:0, 现金:0, 京东外卖:0, 美团外卖:0, 淘宝闪购:0, 美团验券:0, 抖音外卖:0, 采购:0 };
      }
      for (var src of Object.keys(chMap)) {
        var idx = headers.indexOf(src);
        if (idx !== -1) {
          var v = parseFloat(row[idx]);
          if (!isNaN(v)) storeData[rowDate][name][chMap[src]] += v;
        }
      }
    }
    
    // 存入 localStorage（去重：同日期同名文件不重复存）
    var files = loadFileList();
    var exists = files.find(function(f){return f.name === file.name && f.date === fileDate});
    if (!exists) {
      files.push({ name: file.name, date: fileDate, data: storeData });
      saveFileList(files);
    }
    
    allStores = [];
    rebuildData();
    init();
    renderFileList();
    
    var storeCount = Object.values(storeData).reduce(function(max, d){return Math.max(max, Object.keys(d).length)}, 0);
    st.innerHTML = "\u2713 上传成功! " + Object.keys(storeData).join(", ") + " " + storeCount + "门店";
    setTimeout(function(){st.style.display='none'}, 3000);
  } catch(e) { 
    console.error(e);
    st.innerHTML = "ERR: " + e.message; 
  }
}

function init() {
  allStores = [];
  var seen = {};
  for (var di = 0; di < dates.length; di++) {
    var dt = dates[di];
    for (var name in DATA[dt]) {
      if (!seen[name]) {
        seen[name] = true;
        var totals = {};
        for (var ci = 0; ci < channels.length; ci++) {
          var ch = channels[ci];
          var s = 0;
          for (var dj = 0; dj < dates.length; dj++) { s += (DATA[dates[dj]][name]||{})[ch]||0; }
          totals[ch] = Math.round(s*100)/100;
        }
        allStores.push({name: name, totals: totals});
      }
    }
  }
  allStores.sort(function(a,b){return (b.totals['总支付']||0)-(a.totals['总支付']||0)});
  
  document.getElementById('sStores').textContent = allStores.length;
  document.getElementById('sDates').textContent = dates.length;
  var grand = allStores.reduce(function(a,b){return a+(b.totals['总支付']||0)},0);
  document.getElementById('sTotal').textContent = '\u00a5' + (grand/10000).toFixed(1) + '万';
  
  renderTopCards();
  renderOverviewCharts();
  renderDailyTable();
  renderStoreList();
}

function renderTopCards() {
  var g = document.getElementById('topGrid');
  g.innerHTML = allStores.slice(0,10).map(function(s){
    return '<div class="card" onclick="showDetail(\''+esc(s.name)+'\')"><h4>\uD83C\uDFEA '+esc(s.name)+'</h4><div class="card-num">\u00a5'+s.totals['总支付'].toLocaleString()+'</div><div class="card-sub">'+dates.length+'日总支付 \u00b7 点击查看 \u2192</div></div>';
  }).join('');
}

function renderOverviewCharts() {
  var c = document.getElementById('overviewCharts');
  if (dates.length < 2) { c.innerHTML = ''; return; }
  c.innerHTML = '<div class="chart-card"><h3>每日总支付趋势</h3><canvas id="ocLine" height="120"></canvas></div><div class="chart-card"><h3>渠道金额对比</h3><canvas id="ocBar" height="120"></canvas></div>';
  
  var dailyTotals = dates.map(function(d){var s=0;for(var n in DATA[d])s+=DATA[d][n]['总支付']||0;return Math.round(s)});
  new Chart(document.getElementById('ocLine'),{type:'line',data:{labels:dates,datasets:[{label:'总支付',data:dailyTotals,borderColor:'#4472C4',backgroundColor:'rgba(68,114,196,0.1)',fill:true,tension:0.4,pointRadius:5}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
  
  var chVals = chShort.map(function(ch){var s=0;for(var i=0;i<dates.length;i++)for(var n in DATA[dates[i]])s+=(DATA[dates[i]][n]||{})[ch]||0;return Math.round(s)});
  new Chart(document.getElementById('ocBar'),{type:'bar',data:{labels:chShort,datasets:[{label:'金额',data:chVals,backgroundColor:'rgba(68,114,196,0.75)',borderRadius:6}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
}

function renderDailyTable() {
  var wrap = document.getElementById('dailyTableWrap');
  if (dates.length === 0) { wrap.style.display='none'; return; }
  wrap.style.display='block';
  document.getElementById('dailyHead').innerHTML='<th>日期</th><th>门店数</th>'+channels.map(function(ch){return '<th>'+ch+'</th>'}).join('');
  var rows = dates.map(function(dt){
    var d=DATA[dt];var names=Object.keys(d);
    var cells=['<td>'+dt+'</td>','<td>'+names.length+'</td>'];
    for (var i=0;i<channels.length;i++){var s=0;for(var n in d)s+=d[n][channels[i]]||0;cells.push('<td>'+Math.round(s*100)/100+'</td>');}
    return '<tr>'+cells.join('')+'</tr>';
  }).join('');
  var procTotal=0;for(var i=0;i<dates.length;i++)for(var n in DATA[dates[i]])procTotal+=(DATA[dates[i]][n]['采购']||0);
  if(procTotal>0)rows+='<tr class="sum-row"><td>\uD83D\uDCE6 采购合计</td><td>-</td>'+channels.map(function(){return '<td>-</td>'}).join('')+'</tr>';
  document.getElementById('dailyBody').innerHTML=rows;
}

function renderStoreList(list) {
  list=list||allStores;
  if(list.length===0){document.getElementById('storeListWrap').style.display='none';return;}
  document.getElementById('storeRows').innerHTML=list.map(function(s){return '<div class="store-row" onclick="showDetail(\''+esc(s.name)+'\')"><div class="sn">\uD83C\uDFEA '+esc(s.name)+'</div><div class="sv">\u00a5'+s.totals['总支付'].toLocaleString()+'</div></div>'}).join('');
  document.getElementById('storeListWrap').style.display='block';
}
function filterS(){
  var q=document.querySelector('.search-bar input').value.trim().toLowerCase();
  renderStoreList(q?allStores.filter(function(s){return s.name.toLowerCase().includes(q)}):allStores);
}

function showDetail(name) {
  document.getElementById('mainView').style.display='none';
  document.getElementById('detailView').classList.add('active');
  document.getElementById('dTitle').textContent='\uD83C\uDFEA '+name;
  document.getElementById('dSub').textContent='数据日期：'+dates.join(' / ');
  
  var keyCh=['总支付','抖音验券','微信支付','支付宝','美团外卖'];
  var changes={};
  if(dates.length>=2){
    var d1=dates[dates.length-2],d2=dates[dates.length-1];
    for(var i=0;i<keyCh.length;i++){
      var ch=keyCh[i];
      var v1=(DATA[d1][name]||{})[ch]||0,v2=(DATA[d2][name]||{})[ch]||0;
      changes[ch]=v1>0?Math.round((v2-v1)/v1*1000)/10:null;
    }
  }
  document.getElementById('dStats').innerHTML=keyCh.map(function(ch){
    var latest=(DATA[dates[dates.length-1]][name]||{})[ch]||0;
    var c=changes[ch];
    var cs=c===null?'仅一期':((c>=0?'+':'')+c+'%');
    var cl=c===null?'neu':(c>=0?'up':'down');
    return '<div class="stat-c"><div class="sl">'+ch+'</div><div class="sv">\u00a5'+latest.toLocaleString()+'</div><div class="sc '+cl+'">'+(dates.length>1?'较上期 '+cs:'')+'</div></div>';
  }).join('');
  
  var procVal=(DATA[dates[dates.length-1]][name]||{})['采购']||0;
  var procSection=document.getElementById('procurementSection');
  var procEl=document.getElementById('procStats');
  if(procVal>0||dates.some(function(d){return(DATA[d][name]||{})['采购']>0})){
    procSection.style.display='block';
    var procHtml='<div style="padding:10px;background:#fff3e0;border-radius:10px"><div style="font-size:13px;color:#888">最新日期采购金额</div><div style="font-size:22px;font-weight:700;color:#e65100">\u00a5'+procVal.toFixed(2)+'</div></div>';
    var procDays=dates.map(function(d){var pv=(DATA[d][name]||{})['采购']||0;return pv>0?'<div style="padding:6px 10px;background:#fff8e1;border-radius:8px;font-size:13px">'+d+'：\u00a5'+pv.toFixed(2)+'</div>':''}).filter(Boolean).join('');
    if(procDays)procHtml+='<div style="margin-top:10px;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px">'+procDays+'</div>';
    procEl.innerHTML=procHtml;
  }else{procSection.style.display='none';}
  
  var dtCh=['总支付','抖音验券','微信支付','支付宝','京东外卖','美团外卖','淘宝闪购','美团验券','抖音外卖'];
  document.getElementById('dtHead').innerHTML='<th>日期</th>'+dtCh.map(function(c){return '<th>'+c+'</th>'}).join('');
  document.getElementById('dtBody').innerHTML=dates.map(function(dt){var r=DATA[dt][name]||{};return '<tr><td>'+dt+'</td>'+dtCh.map(function(c){return '<td>\u00a5'+((r[c]||0).toLocaleString())+'</td>'}).join('')+'</tr>'}).join('');
  
  setTimeout(function(){renderDetailCharts(name)},100);
}

function closeDetail(){document.getElementById('detailView').classList.remove('active');document.getElementById('mainView').style.display=''}

function renderDetailCharts(name){
  Chart.defaults.font.family="'Microsoft YaHei',sans-serif";
  var COLORS=['#4472C4','#ED7D31','#A5A5A5','#70AD47','#FFC000','#5B9BD5','#D97D7A','#B5855A','#636382','#92CD50'];
  var latestDt=dates[dates.length-1];
  var lr=DATA[latestDt][name]||{};
  
  var barCh=['总支付','抖音验券','微信支付','支付宝','京东外卖','美团外卖','淘宝闪购','美团验券','抖音外卖'];
  new Chart(document.getElementById('dcBar'),{type:'bar',data:{labels:barCh,datasets:[{label:'金额',data:barCh.map(function(ch){return lr[ch]||0}),backgroundColor:COLORS,borderRadius:6}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
  
  var pieCh=['抖音验券','微信支付','支付宝','京东外卖','美团外卖','淘宝闪购','美团验券','抖音外卖'];
  new Chart(document.getElementById('dcPie'),{type:'pie',data:{labels:pieCh,datasets:[{data:pieCh.map(function(ch){return lr[ch]||0}),backgroundColor:COLORS}]},options:{responsive:true,plugins:{legend:{position:'right',labels:{boxWidth:12,font:{size:11}}}}}});
  
  new Chart(document.getElementById('dcTrend'),{type:'line',data:{labels:dates,datasets:[{label:'总支付',data:dates.map(function(d){return(DATA[d][name]||{})['总支付']||0}),borderColor:'#4472C4',backgroundColor:'rgba(68,114,196,0.1)',fill:true,tension:0.4,pointRadius:5}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
  
  var delCh=['抖音验券','美团验券','抖音外卖','美团外卖','京东外卖','淘宝闪购'];
  new Chart(document.getElementById('dcDeliv'),{type:'line',data:{labels:dates,datasets:delCh.map(function(ch,i){return{label:ch,data:dates.map(function(d){return(DATA[d][name]||{})[ch]||0}),borderColor:COLORS[i%COLORS.length],backgroundColor:'transparent',tension:0.4,pointRadius:4}})},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:11}}}},scales:{y:{beginAtZero:true}}}});
}

function esc(s){return s.replace(/'/g,"&#39;").replace(/"/g,'&quot;')}

// 启动
rebuildData();
init();
renderFileList();
</script>
